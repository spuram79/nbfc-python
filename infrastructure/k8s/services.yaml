# Additional Services Deployment for NBFC Platform
# This file contains deployments for remaining services not in the main deployment.yaml

# Disbursement Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: disbursement-service
  namespace: nbfc-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: disbursement-service
  template:
    metadata:
      labels:
        app: disbursement-service
    spec:
      containers:
      - name: disbursement-service
        image: nbfc/disbursement-service:latest
        ports:
        - containerPort: 3008
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: nbfc-config
              key: DATABASE_URL
        - name: PAYMENT_GATEWAY
          value: "razorpay"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
---
apiVersion: v1
kind: Service
metadata:
  name: disbursement-service
  namespace: nbfc-platform
spec:
  selector:
    app: disbursement-service
  ports:
    - protocol: TCP
      port: 3008
      targetPort: 3008
  type: ClusterIP

