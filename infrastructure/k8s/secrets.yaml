# Production Secrets for NBFC Platform
# Note: In production, these values will be injected via external secret management (AWS Secrets Manager, HashiCorp Vault, etc.)
# For demo/development purposes, actual values are set. In production, use:
# kubectl create secret generic nbfc-secrets --from-literal=JWT_SECRET=<secret> --from-literal=DB_PASSWORD=<secret> etc.

apiVersion: v1
kind: Secret
metadata:
  name: nbfc-secrets
  namespace: nbfc-platform
type: Opaque
data:
  # Base64 encoded values (to be replaced with actual secrets in production)
  JWT_SECRET: eW91ci1qd3ktc2VjcmV0LWtleS1jaGFuZ2UtaW4tcHJvZHVjdGlvbg==
  DB_PASSWORD: cGFzc3dvcmQ=
  REDIS_PASSWORD: ""
  RAZORPAY_KEY_ID: ""
  RAZORPAY_KEY_SECRET: ""
  STRIPE_SECRET_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

---
# External Secrets (if using External Secrets Operator)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nbfc-aws-credentials
  namespace: nbfc-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: nbfc-aws-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: nbfc/aws-access-key-id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: nbfc/aws-secret-access-key

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: nbfc-payment-secrets
  namespace: nbfc-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: nbfc-payment-secrets
    creationPolicy: Owner
  data:
    - secretKey: RAZORPAY_KEY_ID
      remoteRef:
        key: nbfc/razorpay-key-id
    - secretKey: RAZORPAY_KEY_SECRET
      remoteRef:
        key: nbfc/razorpay-key-secret
    - secretKey: STRIPE_SECRET_KEY
      remoteRef:
        key: nbfc/stripe-secret-key