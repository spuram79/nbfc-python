apiVersion: v1
kind: Secret
metadata:
  name: nbfc-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "nbfc.labels" (dict "chart" .Chart "Release" .Release) | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.JWT_SECRET | default "your-jwt-secret-change-in-production" }}
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | default "postgresql://postgres:password@postgres-service:5432/nbfc" }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | default "redis://redis-service:6379" }}
  KAFKA_BROKERS: {{ .Values.secrets.KAFKA_BROKERS | default "kafka-service:9092" }}
  RAZORPAY_KEY_ID: {{ .Values.secrets.RAZORPAY_KEY_ID | default "" }}
  RAZORPAY_KEY_SECRET: {{ .Values.secrets.RAZORPAY_KEY_SECRET | default "" }}
  STRIPE_SECRET_KEY: {{ .Values.secrets.STRIPE_SECRET_KEY | default "" }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.AWS_ACCESS_KEY_ID | default "" }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.AWS_SECRET_ACCESS_KEY | default "" }}