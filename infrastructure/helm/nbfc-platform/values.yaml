# Default values for nbfc-platform
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# Namespace configuration
namespace: nbfc-platform

# Image configuration
image:
  repository: nbfc
  pullPolicy: IfNotPresent
  tag: latest

# Replica counts
replicaCount:
  auth: 2
  customer: 2
  loan: 2
  underwriting: 1
  disbursement: 2
  document: 2
  collections: 2
  reporting: 1
  compliance: 1
  config: 1
  nginx: 2

# Resource limits
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Service configuration
service:
  type: ClusterIP
  port:
    auth: 3001
    customer: 3003
    loan: 3004
    underwriting: 3007
    disbursement: 3008
    document: 3009
    collections: 3010
    reporting: 3011
    compliance: 3012
    config: 3002
    nginx: 80

# Database configuration
database:
  enabled: true
  image: postgres:15
  port: 5432
  name: nbfc
  user: postgres
  password: ""
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""

# Redis configuration
redis:
  enabled: true
  image: redis:7-alpine
  port: 6379

# Kafka configuration
kafka:
  enabled: true
  image: bitnami/kafka:latest
  port: 9092
  controllerPort: 9093

# Elasticsearch configuration
elasticsearch:
  enabled: true
  image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  port: 9200
  javaOpts: "-Xms512m -Xmx512m"

# Environment variables
env:
  NODE_ENV: production
  JWT_ACCESS_EXPIRY: 15m
  JWT_REFRESH_EXPIRY: 7d
  BCRYPT_SALT_ROUNDS: 12
  SESSION_EXPIRY: 24h
  DB_POOL_SIZE: 20
  MAX_SESSIONS_PER_USER: 5

# Secrets (to be overridden in production)
secrets:
  JWT_SECRET: ""
  DB_PASSWORD: ""
  REDIS_PASSWORD: ""
  RAZORPAY_KEY_ID: ""
  RAZORPAY_KEY_SECRET: ""
  STRIPE_SECRET_KEY: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: nbfc.local
      paths:
        - path: /api/auth
          service: auth-service
        - path: /api/customer
          service: customer-service
        - path: /api/loan
          service: loan-service
        - path: /api/underwriting
          service: underwriting-service
        - path: /api/disbursement
          service: disbursement-service
        - path: /api/document
          service: document-service
        - path: /api/collections
          service: collections-service
        - path: /api/reporting
          service: reporting-service
        - path: /api/compliance
          service: compliance-service

# Persistence configuration
persistence:
  enabled: true
  postgres:
    size: 10Gi
    storageClass: ""
  redis:
    size: 1Gi
    storageClass: ""

# Monitoring configuration
monitoring:
  enabled: false
  prometheus:
    enabled: false
  grafana:
    enabled: false

# Autoscaling configuration
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Node selector and tolerations
nodeSelector: {}
tolerations: []
affinity: {}