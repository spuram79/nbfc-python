version: '3.8'

services:
  # Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - customer-service
      - loan-service

  # Services
  auth-service:
    build: ./services/auth
    ports:
      - "8081:8081"
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis

  config-service:
    build: ./services/config
    ports:
      - "8082:8082"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  customer-service:
    build: ./services/customer
    ports:
      - "8083:8083"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres
      - elasticsearch

  loan-service:
    build: ./services/loan
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres

  underwriting-service:
    build: ./services/underwriting
    ports:
      - "8085:8085"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - postgres

  disbursement-service:
    build: ./services/disbursement
    ports:
      - "8086:8086"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      - postgres

  document-service:
    build: ./services/document
    ports:
      - "8087:8087"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - postgres

  collections-service:
    build: ./services/collections
    ports:
      - "8088:8088"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres

  reporting-service:
    build: ./services/reporting
    ports:
      - "8089:8089"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres

  compliance-service:
    build: ./services/compliance
    ports:
      - "8090:8090"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres

  # Data Stores
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=nbfc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLS=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
    depends_on:
      - zookeeper
    depends_on:
      - zookeeper

  zookeeper:
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"

volumes:
  postgres_data: