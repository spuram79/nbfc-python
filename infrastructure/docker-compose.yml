version: '3.8'

services:
  # API Gateway / Nginx
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - auth-service
      - config-service
      - customer-service
      - loan-service
      - underwriting-service
      - disbursement-service
      - document-service
      - collections-service
      - reporting-service
      - compliance-service

  # Services
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - JWT_SECRET=${JWT_SECRET:-your-jwt-secret-key-change-in-production}
    depends_on:
      - postgres
      - redis
    networks:
      - nbfc-network

  config-service:
    build:
      context: .
      dockerfile: services/config/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - nbfc-network

  customer-service:
    build:
      context: .
      dockerfile: services/customer/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres
      - elasticsearch
    networks:
      - nbfc-network

  loan-service:
    build:
      context: .
      dockerfile: services/loan/Dockerfile
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres
    networks:
      - nbfc-network

  underwriting-service:
    build:
      context: .
      dockerfile: services/underwriting/Dockerfile
    ports:
      - "3007:3007"
    environment:
      - PYTHONPATH=/app
    depends_on:
      - postgres
    networks:
      - nbfc-network

  disbursement-service:
    build:
      context: .
      dockerfile: services/disbursement/Dockerfile
    ports:
      - "3008:3008"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      - postgres
    networks:
      - nbfc-network

  document-service:
    build:
      context: .
      dockerfile: services/document/Dockerfile
    ports:
      - "3009:3009"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    depends_on:
      - postgres
    networks:
      - nbfc-network

  collections-service:
    build:
      context: .
      dockerfile: services/collections/Dockerfile
    ports:
      - "3010:3010"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres
    networks:
      - nbfc-network

  reporting-service:
    build:
      context: .
      dockerfile: services/reporting/Dockerfile
    ports:
      - "3011:3011"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres
    networks:
      - nbfc-network

  compliance-service:
    build:
      context: .
      dockerfile: services/compliance/Dockerfile
    ports:
      - "3012:3012"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/nbfc
    depends_on:
      - postgres
    networks:
      - nbfc-network

  # Data Stores
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_DB=nbfc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nbfc-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - nbfc-network

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - nbfc-network

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_PROCESS_ROLS=controller,broker
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
    depends_on:
      - zookeeper
    networks:
      - nbfc-network

  zookeeper:
    image: bitnami/zookeeper:latest
    ports:
      - "2181:2181"
    networks:
      - nbfc-network

networks:
  nbfc-network:
    driver: bridge

volumes:
  postgres_data: